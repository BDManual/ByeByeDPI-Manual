baseURL: /
relativeURLs: true
title: ByeByeDPI

languages:
  en:
    languageName: English
    weight: 2
    title: ByeByeDPI
  ru:
    languageName: Русский
    weight: 1
    title: ByeByeDPI

disableKinds:
  - RSS

module:
  imports:
    - path: github.com/imfing/hextra

defaultContentLanguage: ru

params:
  externalLinkDecoration: true
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: logo.png
      dark: logo-dark.png
      width: 32
      height: 32
  theme:
    default: system
    displayToggle: true
  footer:
    enable: false

menu:
  main:
    - identifier: docs
      pageRef: /docs
      weight: 1
    - name: Поиск
      weight: 1
      params:
        type: search
    - name: GitHub
      weight: 2
      url: "https://github.com/romanvht/ByeByeDPI"
      params:
        icon: github
    - name: Сменить тему
      params:
        type: theme-toggle
    - name: Сменить язык
      params:
        type: language-switch

markup:
  defaultMarkdownHandler: goldmark
  goldmark:
    renderer:
      unsafe: true

author:
  name: ByeByeDPI
  email: bdman@tutamail.com
